<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Logistics Analysis Dashboard 物流分析表</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@600;700&family=Noto+Sans+TC:wght@400;500;700;900&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/chartjs-plugin-datalabels/2.2.0/chartjs-plugin-datalabels.min.js"></script>
<style>
  :root{
    --gutter: clamp(14px, 4vw, 32px);
    --page-max: 1440px;
    --bg:#F2F4F7;
    --card:#FFFFFF;
    --border:#E5E9EF;
    --text:#20272F;
    --text-muted:#7A8494;
    --orange:#E67E30;
    --navy:#1F2937;
    --blue:#2F6FED;
    --blue-dim:#EAF1FE;
    --green:#28A867;
    --green-dim:#E7F7EF;

    --c-711:#3DAA5C;
    --c-family:#2F8FE0;
    --c-hilife:#E14F4F;
    --c-shopee:#F08A34;
    --c-hct:#F0C24A;
    --c-standard:#9B59D0;
    --line:#334155;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  html{font-size:16px;}
  body{
    background:var(--bg);
    color:var(--text);
    font-family:'Noto Sans TC', sans-serif;
    font-size:15px;
    line-height:1.5;
    min-height:100vh;
    width:100%;
    overflow-x:hidden;
    padding-bottom:60px;
  }
  .mono{font-family:'IBM Plex Mono', monospace;}
  a{color:inherit;}

  header{max-width:var(--page-max); margin:0 auto; padding:30px var(--gutter) 6px;}
  h1.title{
    font-family:'Space Grotesk', sans-serif;
    font-weight:700; font-size:28px; letter-spacing:-0.01em;
  }
  h1.title .en{color:var(--orange);}
  h1.title .zh{color:var(--navy); font-family:'Noto Sans TC',sans-serif; font-weight:900; margin-left:4px;}

  main{max-width:var(--page-max); margin:0 auto; padding:14px var(--gutter) 0; width:100%; box-sizing:border-box;}

  .card{
    background:var(--card); border:1px solid var(--border); border-radius:14px;
    padding:24px; box-shadow:0 1px 2px rgba(20,30,40,0.03);
  }
  .card + .card{margin-top:18px;}

  /* upload card */
  .upload-card{text-align:center;}
  .dropzone{
    border:1.5px dashed #D8A15C; border-radius:12px; padding:34px 20px;
    background:#FFFCF7; cursor:pointer; transition:.15s;
  }
  .dropzone:hover{background:#FFF7EA;}
  .dropzone .headline{color:var(--orange); font-weight:700; font-size:16px;}
  .dropzone .sub{color:var(--text-muted); font-size:14px; margin-top:6px;}
  .upload-actions{display:flex; gap:14px; justify-content:center; margin-top:20px; flex-wrap:wrap;}

  .queue-row{
    display:flex; align-items:center; gap:10px; padding:9px 12px; border:1px solid var(--border);
    border-radius:8px; background:#FAFBFC; margin-top:8px; flex-wrap:wrap;
  }
  .queue-row .fname{flex:1; min-width:160px; font-size:14px; word-break:break-all;}
  .queue-row select{
    background:#fff; border:1px solid var(--border); border-radius:6px; padding:6px 8px; font-size:14px;
  }
  .queue-row .remove{background:none; border:none; color:var(--text-muted); cursor:pointer; font-size:16px; padding:2px 6px;}
  .queue-row .remove:hover{color:#E14F4F;}
  .queue-row .status{font-size:13px; color:var(--text-muted); min-width:70px; text-align:right;}
  .queue-row .status.ok{color:var(--green); font-weight:600;}
  .queue-row .status.dup{color:var(--orange); font-weight:600;}
  .queue-row .status.err{color:#E14F4F; font-weight:600;}

  .btn{
    font-family:'Noto Sans TC',sans-serif; font-weight:600; font-size:15px; cursor:pointer;
    border-radius:8px; padding:12px 22px; border:none; transition:.15s;
  }
  .btn.blue{background:var(--blue); color:#fff;}
  .btn.blue:hover{filter:brightness(1.06);}
  .btn.green-outline{background:var(--green-dim); color:var(--green); display:inline-flex; align-items:center; gap:8px;}
  .btn.green-outline:hover{filter:brightness(0.98);}
  .btn.green-outline .dot{width:7px; height:7px; border-radius:50%; background:var(--green); display:inline-block;}
  .btn.small{padding:8px 14px; font-size:14px; background:var(--blue-dim); color:var(--blue); font-weight:500;}

  /* two-column analysis */
  .grid-2{display:grid; grid-template-columns:1fr 1fr; gap:18px; margin-top:18px;}
  @media (max-width:900px){.grid-2{grid-template-columns:1fr;}}

  .panel-head{display:flex; align-items:center; gap:8px; margin-bottom:16px;}
  .panel-head .icon{
    width:26px; height:26px; border-radius:6px; display:flex; align-items:center; justify-content:center;
    background:var(--blue-dim); color:var(--blue); font-size:14px; flex-shrink:0;
  }
  .panel-head h2{font-size:17px; font-weight:700;}

  .filter-row{display:flex; gap:14px; flex-wrap:wrap; margin-bottom:18px;}
  .field{display:flex; flex-direction:column; gap:6px; flex:1; min-width:150px;}
  .field label{font-size:14px; color:var(--text-muted); font-weight:500;}
  .field input, .field select{
    background:#fff; border:1px solid var(--border); color:var(--text);
    padding:10px 10px; border-radius:7px; font-family:'Noto Sans TC',sans-serif; font-size:15px;
  }

  .stat-row{display:grid; grid-template-columns:repeat(6,1fr); gap:10px; margin-bottom:18px;}
  @media (max-width:520px){.stat-row{grid-template-columns:repeat(3,1fr);}}
  .stat{
    background:#FAFBFC; border:1px solid var(--border); border-radius:10px; padding:12px 6px;
    text-align:center;
  }
  .stat .name{font-size:14px; color:var(--text-muted); margin-bottom:4px;}
  .stat .val{font-family:'IBM Plex Mono',monospace; font-size:20px; font-weight:700; color:var(--c);}

  .range-label{font-size:14px; color:var(--text-muted); margin:-6px 0 14px;}

  canvas{max-width:100%;}

  .table-wrap{overflow-x:auto; -webkit-overflow-scrolling:touch;}
  table{width:100%; min-width:640px; border-collapse:collapse; font-size:14px;}
  th{
    text-align:left; font-size:14px; font-weight:600; color:var(--text-muted);
    padding:10px 10px; border-bottom:1px solid var(--border); background:#FAFBFC; white-space:nowrap;
  }
  td{padding:11px 10px; border-bottom:1px solid #F0F2F5; white-space:nowrap;}
  tr:last-child td{border-bottom:none;}
  .badge{
    display:inline-flex; align-items:center; gap:6px; font-size:14px; font-weight:600;
    padding:4px 10px; border-radius:20px; background:var(--green-dim); color:var(--green);
  }
  .badge .dot{width:6px; height:6px; border-radius:50%; background:var(--green);}

  footer{max-width:var(--page-max); margin:24px auto 0; padding:0 var(--gutter); color:var(--text-muted); font-size:14px;}

  @media (max-width:768px){
    .stat-row{grid-template-columns:repeat(3,1fr);}
  }

  @media (max-width:640px){
    header{padding-top:22px; padding-bottom:4px;}
    main{padding-top:12px;}
    .card{padding:16px; border-radius:12px;}
    h1.title{font-size:21px;}
    .upload-actions{flex-direction:column;}
    .upload-actions .btn{width:100%;}
    .dropzone{padding:24px 12px;}
  }
  @media (max-width:380px){
    :root{ --gutter: 10px; }
    .card{padding:14px;}
  }
</style>
</head>
<body>

<header>
  <h1 class="title"><span class="en">Logistics Analysis</span> <span class="zh">Dashboard 物流分析表</span></h1>
</header>

<main>

  <div class="card upload-card">
    <div class="dropzone" id="dropzone">
      <div class="headline">＋ 將物流 PDF 面單拖曳至此，或點擊選擇檔案</div>
      <div class="sub">可一次選擇多個檔案，系統會先依檔名猜測物流商，上傳前可手動修正</div>
      <input type="file" id="file-input" accept="application/pdf" multiple hidden>
    </div>
    <div id="queue-list" style="text-align:left; margin-top:14px;"></div>
    <div class="upload-actions">
      <button class="btn blue" id="parse-btn" onclick="startUpload()">開始解析上傳</button>
      <a href="#" id="open-sheet-btn-top" class="btn green-outline"><span class="dot"></span>前往查看 Excel 明細</a>
    </div>
  </div>

  <div class="grid-2">
    <!-- 分析欄位1 -->
    <div class="card">
      <div class="panel-head"><span class="icon">📊</span><h2>物流分佈統計</h2></div>
      <div class="filter-row">
        <div class="field"><label>開始日期</label><input type="date" id="stat-start"></div>
        <div class="field"><label>結束日期</label><input type="date" id="stat-end"></div>
        <div class="field"><label>&nbsp;</label><button class="btn blue" onclick="renderStats()">套用篩選</button></div>
      </div>
      <div class="stat-row" id="stat-grid"></div>
      <p class="range-label" id="stat-range-label"></p>
      <canvas id="statChart" height="180"></canvas>
    </div>

    <!-- 分析欄位2 -->
    <div class="card">
      <div class="panel-head"><span class="icon">📈</span><h2>營運趨勢分析</h2></div>
      <div class="filter-row">
        <div class="field">
          <label>時間單位</label>
          <select id="trend-unit" onchange="onUnitChange()">
            <option value="day">按日分析（最多31天）</option>
            <option value="month" selected>按月分析</option>
          </select>
        </div>
        <div class="field">
          <label id="trend-range-label">選擇月份區間</label>
          <div style="display:flex; gap:6px;">
            <input type="month" id="trend-start">
            <input type="month" id="trend-end">
          </div>
        </div>
      </div>
      </div>
      <div class="filter-row" style="margin-bottom:8px;">
        <div class="field">
          <label>物流管道</label>
          <select id="trend-carrier">
            <option value="all">全部物流</option>
            <option value="711">7-11</option>
            <option value="family">全家</option>
            <option value="hilife">萊爾富</option>
            <option value="shopee">店到家</option>
            <option value="hct">HCT</option>
            <option value="standard">標準配送</option>
          </select>
        </div>
        <div class="field"><label>&nbsp;</label><button class="btn blue" onclick="renderTrend()">套用篩選</button></div>
      </div>
      <p class="range-label" id="trend-range-label-text"></p>
      <canvas id="trendChart" height="180"></canvas>
    </div>
  </div>

  <div class="card" id="excel-detail">
    <div class="panel-head"><span class="icon">📋</span><h2>Excel 明細</h2></div>
    <p style="color:var(--text-muted); font-size:14px; margin-bottom:14px;">明細資料直接以 Google Sheet 為準，不在網頁重複顯示，點下方按鈕開啟原始表單查看。</p>
    <a href="#" id="open-sheet-btn" class="btn blue" style="display:inline-block; text-decoration:none;">開啟 Excel 明細表單</a>
  </div>

</main>

<footer>Prototype demo · 資料為示範用假資料，尚未串接 Apps Script / Google Sheets 後端</footer>

<script>
Chart.register(ChartDataLabels);

/* ====== 後端 API 設定 ======
   部署好 Apps Script 網頁應用程式後，把網址貼在這裡（.../exec 結尾）。
   留空字串 = 使用畫面內建的示範假資料，方便還沒串接後端時先看畫面效果。 */
const API_URL = 'https://script.google.com/macros/s/AKfycbxBf1blkJghciYHOulCySsHgnym24522f7dhJnUJjxAu4DRViT3Kr1pTh4fIrXAskb0Ug/exec';

async function apiGet_(params){
  if(!API_URL) return null;
  try{
    const qs = new URLSearchParams(params).toString();
    const res = await fetch(`${API_URL}?${qs}`);
    if(!res.ok) throw new Error('HTTP '+res.status);
    return await res.json();
  }catch(err){
    console.warn('API 讀取失敗，改用示範資料', err);
    return null;
  }
}

const CARRIERS = [
  {key:'711',      name:'7-11',     color:'#3DAA5C'},
  {key:'family',   name:'全家',     color:'#2F8FE0'},
  {key:'hilife',   name:'萊爾富',   color:'#E14F4F'},
  {key:'shopee',   name:'店到家',   color:'#F08A34'},
  {key:'hct',      name:'HCT',      color:'#F0C24A'},
  {key:'standard', name:'標準配送', color:'#9B59D0'},
];

/* ---------- mock data helpers ---------- */
function seededRandom(seed){ let s=seed; return ()=>{ s = (s*9301+49297)%233280; return s/233280; }; }
function dailyCounts(dateStr, key){
  const seed = Number(dateStr.split('-').join('')) + key.length*97;
  const rnd = seededRandom(seed);
  const base = {'711':4,'family':4,'hilife':5,'shopee':6,'hct':9,'standard':10}[key] || 5;
  return Math.max(0, Math.round(base + (rnd()-0.5)*base*0.8));
}
function pad(n){ return String(n).padStart(2,'0'); }
function daysBetween(start,end){
  const days=[]; let d=new Date(start+'T00:00:00'); const e=new Date(end+'T00:00:00');
  while(d<=e){ days.push(d.toISOString().slice(0,10)); d.setDate(d.getDate()+1); }
  return days;
}
function monthsBetween(startYm, endYm){
  const out=[]; let [sy,sm]=startYm.split('-').map(Number); const [ey,em]=endYm.split('-').map(Number);
  while(sy<ey || (sy===ey && sm<=em)){ out.push(`${sy}-${pad(sm)}`); sm++; if(sm>12){sm=1; sy++;} }
  return out;
}
function daysInMonth(ym){ const [y,m]=ym.split('-').map(Number); return new Date(y,m,0).getDate(); }
function sumForDate(d, carrierSel){
  if(carrierSel==='all') return CARRIERS.reduce((s,c)=> s+dailyCounts(d,c.key),0);
  return dailyCounts(d, carrierSel);
}

/* ---------- 分析欄位1：物流分佈統計 ---------- */
let statChart;
async function renderStats(){
  const start = document.getElementById('stat-start').value;
  const end = document.getElementById('stat-end').value;

  const apiData = await apiGet_({action:'stats', start, end});
  let totals;
  if(apiData && apiData.counts){
    totals = CARRIERS.map(c=> apiData.counts[c.name] || 0);
  } else {
    const days = daysBetween(start,end);
    totals = CARRIERS.map(c=> days.reduce((sum,d)=> sum + dailyCounts(d,c.key), 0));
  }
  document.getElementById('stat-range-label').textContent = `區間：${start} ～ ${end}`;

  const grid = document.getElementById('stat-grid');
  grid.innerHTML = '';
  CARRIERS.forEach((c,i)=>{
    grid.insertAdjacentHTML('beforeend', `
      <div class="stat" style="--c:${c.color}">
        <div class="name">${c.name}</div>
        <div class="val">${totals[i]}</div>
      </div>`);
  });

  if(statChart) statChart.destroy();
  statChart = new Chart(document.getElementById('statChart'), {
    type:'bar',
    data:{ labels: CARRIERS.map(c=>c.name), datasets:[{ data: totals, backgroundColor: CARRIERS.map(c=>c.color), borderRadius:6, maxBarThickness:52 }] },
    options:{
      responsive:true,
      plugins:{
        legend:{display:false},
        tooltip:{enabled:false},
        datalabels:{ anchor:'end', align:'top', color:'#7A8494', font:{size:12.5, family:"'IBM Plex Mono'"}, formatter:v=>v+'件' }
      },
      layout:{padding:{top:16}},
      scales:{
        x:{ grid:{display:false}, ticks:{color:'#4B5563', font:{family:"'Noto Sans TC'", size:13}} },
        y:{ display:false, grid:{display:false} }
      }
    }
  });
}

/* ---------- 日期輔助函式 ---------- */
function pad2_(n){ return String(n).padStart(2,'0'); }
function toDateStr_(d){ return `${d.getFullYear()}-${pad2_(d.getMonth()+1)}-${pad2_(d.getDate())}`; }
function toMonthStr_(d){ return `${d.getFullYear()}-${pad2_(d.getMonth()+1)}`; }
function addDays_(d, n){ const r = new Date(d); r.setDate(r.getDate()+n); return r; }
function addMonths_(d, n){ const r = new Date(d.getFullYear(), d.getMonth()+n, 1); return r; }
function startOfMonth_(d){ return new Date(d.getFullYear(), d.getMonth(), 1); }

/* ---------- 分析欄位2：出貨趨勢追蹤 ---------- */
function onUnitChange(){
  const mode = document.getElementById('trend-unit').value;
  const s = document.getElementById('trend-start');
  const e = document.getElementById('trend-end');
  const today = new Date();
  document.getElementById('trend-range-label').textContent = mode==='day' ? '選擇日期區間' : '選擇月份區間';
  if(mode==='day'){
    s.type='date'; e.type='date';
    if(!/^\d{4}-\d{2}-\d{2}$/.test(s.value)){
      s.value = toDateStr_(addDays_(today, -30)); // 預設今天往前30天
      e.value = toDateStr_(today); // 預設今天
    }
  } else {
    s.type='month'; e.type='month';
    if(!/^\d{4}-\d{2}$/.test(s.value)){
      s.value = toMonthStr_(addMonths_(today, -3)); // 預設當月往前3個月
      e.value = toMonthStr_(today); // 預設當月
    }
  }
}

let trendChart;
async function renderTrend(){
  const mode = document.getElementById('trend-unit').value;
  const carrierSel = document.getElementById('trend-carrier').value;
  const start = document.getElementById('trend-start').value;
  const end = document.getElementById('trend-end').value;

  let labels, values, rangeText;
  const carrierName = carrierSel==='all' ? '全部物流' : CARRIERS.find(c=>c.key===carrierSel).name;

  const apiData = await apiGet_({action:'trend', mode, start, end, carrier: carrierSel==='all' ? 'all' : carrierName});

  if(apiData && apiData.labels){
    labels = apiData.labels;
    values = apiData.values;
    rangeText = mode==='day'
      ? `區間：${start} ～ ${end}　·　${carrierName}`
      : `區間：${start} ～ ${end}　·　${carrierName}`;
  } else if(mode==='day'){
    const days = daysBetween(start, end);
    labels = days.map(d=> d.slice(5));
    values = days.map(d=> sumForDate(d, carrierSel));
    rangeText = `區間：${start} ～ ${end}　·　${carrierName}`;
  } else {
    if(start===end){
      const ym = start; const n = daysInMonth(ym);
      const days = Array.from({length:n},(_,i)=>`${ym}-${pad(i+1)}`);
      labels = days.map(d=>d.slice(5));
      values = days.map(d=>sumForDate(d, carrierSel));
      rangeText = `月份：${ym}（依日拆解，共 ${n} 天）　·　${carrierName}`;
    } else {
      const months = monthsBetween(start,end);
      labels = months;
      values = months.map(ym=>{
        const days = Array.from({length:daysInMonth(ym)},(_,i)=>`${ym}-${pad(i+1)}`);
        return days.reduce((s,d)=>s+sumForDate(d, carrierSel),0);
      });
      rangeText = `區間：${start} ～ ${end}（月總計）　·　${carrierName}`;
    }
  }
  document.getElementById('trend-range-label-text').textContent = rangeText;

  const color = carrierSel==='all' ? '#334155' : CARRIERS.find(c=>c.key===carrierSel).color;

  if(trendChart) trendChart.destroy();
  trendChart = new Chart(document.getElementById('trendChart'), {
    type:'line',
    data:{ labels, datasets:[{ data: values, borderColor:color, backgroundColor:color+'14', pointBackgroundColor:'#fff', pointBorderColor:color, pointBorderWidth:2, pointRadius:4, tension:.35, borderWidth:2.5, fill:true }] },
    options:{
      responsive:true,
      plugins:{
        legend:{display:false},
        tooltip:{enabled:false},
        datalabels:{ anchor:'end', align:'top', color:'#7A8494', font:{size:12.5, family:"'IBM Plex Mono'"}, formatter:v=>v }
      },
      layout:{padding:{top:16}},
      scales:{
        x:{ grid:{display:false}, ticks:{color:'#7A8494', maxRotation:0, autoSkip:true, font:{family:"'IBM Plex Mono'", size:12}} },
        y:{ display:false, grid:{display:false} }
      }
    }
  });
}

/* ---------- Excel 明細連結 ---------- */
const SHEET_URL = 'https://docs.google.com/spreadsheets/d/1TxwaXwCaIQ-ivKNms6PJek4wCnV9dUOXktFTyK1ZKts/edit?gid=549650849#gid=549650849';
function openSheet(e){
  e.preventDefault();
  if(!SHEET_URL){ alert('尚未設定 Excel 表單網址，請在 index.html 的 SHEET_URL 填入 Google Sheet 連結'); return; }
  window.open(SHEET_URL, '_blank');
}
document.getElementById('open-sheet-btn').addEventListener('click', openSheet);
document.getElementById('open-sheet-btn-top').addEventListener('click', openSheet);

/* ---------- 上傳佇列（拖曳 / 選擇檔案） ---------- */

const QUEUE_LIST_THRESHOLD = 20; // 檔案數在這個數字以下才逐筆列出，超過只顯示總數摘要（2000 筆逐筆渲染會很卡）

let queue = []; // {id, file}
let seq = 0;

function addFiles(fileList){
  Array.from(fileList).forEach(file=>{
    if(!file.name.toLowerCase().endsWith('.pdf')) return;
    // 物流商一律「自動判斷」，交給後端依 PDF 實際內容判斷（不用檔名猜，不會被誤判的檔名誤導）
    queue.push({ id: seq++, file });
  });
  renderQueue();
}

function renderQueue(){
  const el = document.getElementById('queue-list');
  if(queue.length === 0){ el.innerHTML = ''; return; }

  if(queue.length > QUEUE_LIST_THRESHOLD){
    el.innerHTML = `
      <div class="queue-row">
        <span class="fname">已加入 <b>${queue.length}</b> 個檔案（物流商將依 PDF 內容自動判斷，數量較多不逐筆列出）</span>
        <button class="remove" onclick="clearQueue()" style="font-size:13px;">清空全部</button>
      </div>`;
    return;
  }

  el.innerHTML = queue.map(q=>`
    <div class="queue-row" data-id="${q.id}">
      <span class="fname mono">${q.file.name}</span>
      <span class="status" id="qstatus-${q.id}">待上傳</span>
      <button class="remove" onclick="removeQueue(${q.id})">✕</button>
    </div>`).join('');
}
function removeQueue(id){ queue = queue.filter(x=>x.id!==id); renderQueue(); }
function clearQueue(){ queue = []; renderQueue(); }

const dropzone = document.getElementById('dropzone');
const fileInput = document.getElementById('file-input');
dropzone.addEventListener('click', ()=> fileInput.click());
fileInput.addEventListener('change', e=>{ addFiles(e.target.files); fileInput.value=''; });
['dragover','dragenter'].forEach(evt=> dropzone.addEventListener(evt, e=>{ e.preventDefault(); dropzone.style.background='#FFF3E0'; }));
['dragleave','drop'].forEach(evt=> dropzone.addEventListener(evt, e=>{ e.preventDefault(); dropzone.style.background=''; }));
dropzone.addEventListener('drop', e=>{ addFiles(e.dataTransfer.files); });

function fileToBase64_(file){
  return new Promise((resolve,reject)=>{
    const reader = new FileReader();
    reader.onload = ()=> resolve(reader.result.split(',')[1]);
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

const BATCH_SIZE = 15; // 每次送給後端的檔案數；因為加了 OCR 流量限制的重試機制，單筆處理時間變長，調低批次數以確保不超過 Apps Script 6 分鐘限制

async function startUpload(){
  if(!API_URL){ alert('尚未設定後端網址（API_URL），請先部署 Apps Script 並填入網址'); return; }
  if(queue.length===0){ alert('請先加入要上傳的 PDF 檔案'); return; }

  const btn = document.getElementById('parse-btn');
  const original = btn.textContent;
  btn.disabled = true;
  const currentQueue = queue;
  currentQueue.forEach(q=> { const el = document.getElementById('qstatus-'+q.id); if(el) el.textContent = '排隊中'; });

  const totals = { inserted:0, duplicateCount:0, duplicates:[], needsReview:[], failed:[] };
  const sortedQueue = [...currentQueue].sort((a,b)=> a.file.name.localeCompare(b.file.name));
  const chunks = [];
  for(let i=0;i<sortedQueue.length;i+=BATCH_SIZE) chunks.push(sortedQueue.slice(i,i+BATCH_SIZE));

  try{
    for(let c=0; c<chunks.length; c++){
      const chunk = chunks[c];
      btn.textContent = `解析上傳中...（${Math.min((c+1)*BATCH_SIZE, currentQueue.length)}/${currentQueue.length}）`;
      chunk.forEach(q=> { const el = document.getElementById('qstatus-'+q.id); if(el) el.textContent = '處理中'; });

      const items = await Promise.all(chunk.map(async q=>({
        carrierType: 'auto',
        filename: q.file.name,
        pdfBase64: await fileToBase64_(q.file)
      })));

      const res = await fetch(API_URL, {
        method:'POST',
        headers:{ 'Content-Type':'text/plain;charset=utf-8' }, // 避免觸發瀏覽器 CORS 預檢請求
        body: JSON.stringify(items)
      });
      const data = await res.json();
      if(!data.success) throw new Error(`第 ${c+1}/${chunks.length} 批上傳失敗：${data.error || '未知錯誤'}`);

      totals.inserted += data.insertedCount;
      totals.duplicateCount += data.duplicateCount;
      totals.duplicates.push(...(data.duplicates?.first5 || []), ...(data.duplicates?.last5 || []));
      totals.needsReview.push(...(data.needsReview || []));
      totals.failed.push(...(data.failed || []));
    }

    let msg = `全部上傳完成：新增 ${totals.inserted} 筆`;
    if(totals.duplicateCount > 0){
      const dupSorted = totals.duplicates;
      msg += `，重複略過 ${totals.duplicateCount} 筆\n\n重複訂單編號（前5筆）：\n${dupSorted.slice(0,5).join('\n')}`;
      if(dupSorted.length>5){
        msg += `\n\n重複訂單編號（末5筆）：\n${dupSorted.slice(-5).join('\n')}`;
      }
    }

    const anomalies = [...totals.needsReview, ...totals.failed]; // 無法判斷物流商 + 其他解析失敗，合併當作「異常」處理
    if(anomalies.length){
      const truncName = f => f.slice(0,14);
      const fmt = r => `${truncName(r.filename)}：${r.reason || '未知原因'}`;
      const first5 = anomalies.slice(0,5).map(fmt);
      const last5 = anomalies.length>5 ? anomalies.slice(-5).map(fmt) : [];
      msg += `\n\n⚠️ ${anomalies.length} 筆無法判斷物流商或解析失敗\n前5筆檔名：\n${first5.join('\n')}`;
      if(last5.length) msg += `\n末5筆檔名：\n${last5.join('\n')}`;
      msg += `\n\n按「確定」= 排除這 ${anomalies.length} 筆，保留其餘上傳結果\n按「取消」= 整批（含已成功的）重新排入佇列，稍後重新上傳整批（已成功寫入的會自動被判定重複而略過，不會重複寫入）`;

      const excludeAnomalies = confirm(msg);
      if(excludeAnomalies){
        queue = [];
      } else {
        queue = currentQueue; // 整批放回佇列，交給重複判斷機制去避免真正重複寫入
      }
    } else {
      alert(msg);
      queue = [];
    }

    renderQueue();
    renderStats();
    renderTrend();
  }catch(err){
    alert('上傳中斷：'+ err.message + '\n\n已成功送出的批次不會受影響，可以重新整理頁面或再次點擊上傳處理剩餘檔案。');
  }finally{
    btn.textContent = original; btn.disabled = false;
  }
}

  const today = new Date();
  document.getElementById('stat-start').value = toDateStr_(startOfMonth_(today)); // 預設當月1號
  document.getElementById('stat-end').value = toDateStr_(today); // 預設今天
})();
onUnitChange();
